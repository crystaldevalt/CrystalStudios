<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Request | CrystalStudios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1 style="color: var(--accent-light);">Submit a Request</h1>

    <!-- Updated Pricing Section -->
    <div class="pricing-container" style="margin-bottom: 30px; padding: 20px; background: #25282c; border: 1px solid var(--border-color); border-radius: 8px;">
        <h2 style="color: var(--accent-light); text-align: center; margin-top: 0;">Prices & Services</h2>
        <ul style="list-style: none; padding: 0; color: var(--accent-lighter);">
            <li style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color);">
                <span>Server Plugin</span>
                <span style="font-weight: bold; color: var(--accent-light);">$2 - $10</span>
            </li>
            <li style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color);">
                <span>Discord Bot</span>
                <span style="font-weight: bold; color: var(--accent-light);">$5</span>
            </li>
            <li style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color);">
                <span>Server Setups</span>
                <span style="font-weight: bold; color: var(--accent-light);">$8</span>
            </li>
            <li style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color);">
                <span>Code Debugging</span>
                <span style="font-weight: bold; color: var(--accent-light);">$6</span>
            </li>
            <li style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color);">
                <span>Website</span>
                <span style="font-weight: bold; color: var(--accent-light);">$1 - $50</span>
            </li>
            <li style="display: flex; justify-content: space-between; padding: 10px 0;">
                <span>Mobile App</span>
                <span style="font-weight: bold; color: var(--accent-light);">$5 - $50</span>
            </li>
        </ul>
    </div>

    <!-- Request Form -->
    <form id="requestForm">
        <label for="name" style="display: block; margin-top: 15px; color: white;">Name:</label>
        <input type="text" id="name" name="name" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: 1px solid var(--border-color); background: #25282c; color: white;" required>
        
        <label for="email" style="display: block; margin-top: 15px; color: white;">Email:</label>
        <input type="email" id="email" name="email" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: 1px solid var(--border-color); background: #25282c; color: white;" required>
        
        <label for="description" style="display: block; margin-top: 15px; color: white;">What do you need developed?</label>
        <textarea id="description" name="description" rows="5" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: 1px solid var(--border-color); background: #25282c; color: white;" required></textarea>
        
        <button type="submit" class="nav-button" style="margin-top: 20px; border: none; width: 100%; cursor: pointer;">Submit Request</button>
    </form>
    
    <br>
    <a href="index.html" style="color: var(--accent-light); text-decoration: none;">← Back to Home</a>
</div>
</body>
</html>

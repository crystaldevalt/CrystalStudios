<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Request | CrystalStudios</title>

    <!-- Theme Persistence Script -->
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.write('<link rel="stylesheet" href="' + (savedTheme === 'light' ? 'light.css' : 'dark.css') + '" id="theme-stylesheet">');
    </script>

    <style>
        body { transition: opacity 0.5s ease; }

        /* Pricing Box Styling */
        .pricing-container {
            margin-bottom: 30px; 
            padding: 20px; 
            background: rgba(0, 0, 0, 0.2); /* Semi-transparent */
            border: 1px solid #3b82f6; 
            border-radius: 8px;
        }

        /* Glowing Blue Text for Prices */
        .pricing-container ul li {
            display: flex; 
            justify-content: space-between; 
            padding: 10px 0; 
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa; /* Light Blue */
            text-shadow: 0 0 8px rgba(96, 165, 250, 0.6); /* Glow */
        }
    </style>
</head>
<body>
<div class="container">
    <h1 style="color: var(--accent-light);">Submit a Request</h1>

    <!-- Pricing Section -->
    <div class="pricing-container">
        <h2 style="color: #3b82f6; text-align: center; margin-top: 0;">Prices & Services</h2>
        <ul style="list-style: none; padding: 0;">
            <li><span>Server Plugin</span> <strong>$2 - $10</strong></li>
            <li><span>Discord Bot</span> <strong>$5</strong></li>
            <li><span>Server Setups</span> <strong>$8</strong></li>
            <li><span>Code Debugging</span> <strong>$6</strong></li>
            <li><span>Website</span> <strong>$1 - $50</strong></li>
            <li><span>Mobile App</span> <strong>$5 - $50</strong></li>
        </ul>
    </div>

    <!-- Request Form -->
    <form id="requestForm">
        <label for="name" style="display: block; margin-top: 15px;">Name:</label>
        <input type="text" id="name" name="name" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: 1px solid #3b82f6; background: rgba(0,0,0,0.1);" required>
        
        <label for="email" style="display: block; margin-top: 15px;">Email:</label>
        <input type="email" id="email" name="email" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: 1px solid #3b82f6; background: rgba(0,0,0,0.1);" required>
        
        <label for="description" style="display: block; margin-top: 15px;">What do you need developed?</label>
        <textarea id="description" name="description" rows="5" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: 1px solid #3b82f6; background: rgba(0,0,0,0.1);" required></textarea>
        
        <button type="submit" class="nav-button" style="margin-top: 20px; border: none; width: 100%; cursor: pointer;">Submit Request</button>
    </form>
    
    <br>
    <a href="index.html" class="tos-link">← Back to Home</a>
</div>

<script src="script.js"></script>
</body>
</html>

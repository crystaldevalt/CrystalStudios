<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrystalStudios | Development</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>CrystalStudios</h1>
        <p>Brought to you by CrystalDev!</p>
    </header>
    <div id="status-container" style="text-align: center; margin: 10px 0; padding-bottom: 20px;">
        Status: <span id="status-indicator">●</span> <span id="status-text">Checking availability...</span>
    </div>
    <div class="features">
        <div class="box"><h3>Quality</h3><p>Reliable code made just for you!</p></div>
        <div class="box"><h3>Speed</h3><p>Delivered quickly!</p></div>
        <div class="box"><h3>Support</h3><p><a href="https://discord.gg/kmEa5FRuRU" target="_blank" rel="noopener noreferrer">Click here to join!</a></p></div>
        <div class="box"><h3>Easy</h3><p>and affordable solutions.</p></div>
    </div>
    <div style="text-align: center; margin-bottom: 40px;">
        <a href="servers.html" class="nav-button">View Sponsored Minecraft Servers</a>
    </div>
    <form id="requestForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <label for="description">What do you need developed?</label>
        <textarea id="description" name="description" rows="5" required></textarea>
        <button type="submit">Submit Request</button>
    </form>
    <button id="theme-toggle" style="width: 100%; margin-top: 40px;">Switch Theme</button>
</div>
<script type="module" src="script.js"></script>
</body>
</html>

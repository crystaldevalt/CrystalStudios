<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrystalStudios | Development</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="discord.css">
</head>
<body>

<div class="container">
    <header>
        <h1>CrystalStudios</h1>
        <div id="typewriter-text">
            <span class="typed-text"></span>
        </div>
    </header>

    <div id="status-container">
        Status: <span id="status-indicator">●</span> <span id="status-text">Checking availability...</span>
    </div>

    <div class="features">
        <div class="box">
            <h3>Quality</h3>
            <p>Reliable code!</p>
        </div>
        <div class="box">
            <h3>Speed</h3>
            <p>Delivered quickly!</p>
        </div>
        <div class="box">
            <h3>Support</h3>
            <p>Use Discord!</p>
        </div>
        <div class="box">
            <h3>Payment</h3>
            <p>CashApp only.</p>
        </div>
    </div>

    <div class="text-center">
        <a href="servers.html" class="nav-button">View Sponsored Minecraft Servers</a>
    </div>

    <div class="text-center">
        <a href="request.html" class="nav-button">Prices and Requests</a>
    </div>

    <div class="text-center">
        <label class="switch-container">
            <input type="checkbox" id="theme-toggle">
        </label>
        <p>Toggle Theme</p>
    </div>

    <div class="text-center">
        <a href="tos.html" class="tos-link">View Terms of Service</a>
    </div>
</div>

<script>
    async function typeWriter(text, elementId, speed = 80) {
        const element = document.querySelector("#" + elementId + " .typed-text");
        if (!element) return;
        element.textContent = "";
        for (let i = 0; i < text.length; i++) {
            element.textContent += text.charAt(i);
            await new Promise(r => setTimeout(r, speed));
        }
    }
    document.addEventListener("DOMContentLoaded", () => {
        typeWriter("Brought to you by CrystalDev!", "typewriter-text", 80);
    });
</script>
<script type="module" src="script.js"></script>
</body>
</html>
